<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Premium Rust Logo -->
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce422b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8181e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#rustGrad)"/>
  <g transform="translate(24, 24)">
    <!-- Rust gear/cog logo -->
    <circle cx="0" cy="0" r="5" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Gear teeth/spokes -->
    <line x1="0" y1="-7" x2="0" y2="-9" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4.95" y1="-4.95" x2="6.36" y2="-6.36" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="7" y1="0" x2="9" y2="0" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="4.95" y1="4.95" x2="6.36" y2="6.36" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="0" y1="7" x2="0" y2="9" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-4.95" y1="4.95" x2="-6.36" y2="6.36" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="-9" y2="0" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-4.95" y1="-4.95" x2="-6.36" y2="-6.36" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.2" fill="#ffffff"/>
  </g>
</svg>
