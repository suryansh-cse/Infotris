<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Premium C++ Logo -->
  <defs>
    <linearGradient id="cppGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00599c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004482;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#cppGrad)"/>
  <g transform="translate(24, 24)">
    <!-- C shape -->
    <path d="M -7,-6 A 6,6 0 0,0 -7,6" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Plus symbols -->
    <g transform="translate(6, -3)">
      <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <g transform="translate(6, 5)">
      <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
